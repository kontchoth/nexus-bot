name: nexusbot
description: NexusBot - AI-Powered Crypto Trading Dashboard
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # SVG
  flutter_svg: ^2.0.10+1

  # BLoC
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  equatable: ^2.0.5

  # Networking & WebSocket
  web_socket_channel: ^2.4.0
  dio: ^5.3.2
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.10
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.6
  google_sign_in: ^6.2.1
  web3dart: ^2.7.3
  http: ^1.2.2
  mobile_scanner: ^7.1.4

  # Charts
  fl_chart: ^0.64.0

  # UI
  shimmer: ^3.0.0
  flutter_animate: ^4.3.0
  percent_indicator: ^4.2.3
  badges: ^3.1.2

  # State / Storage
  shared_preferences: ^2.2.2
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Utils
  intl: ^0.18.1
  rxdart: ^0.27.7
  uuid: ^4.1.0
  flutter_secure_storage: ^9.2.2
  flutter_local_notifications: ^17.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^9.1.4
  mocktail: ^1.0.0
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
